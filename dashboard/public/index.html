<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🤖 Team Dashboard - Управление агентами</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .status-available { background-color: #10b981; }
        .status-busy { background-color: #f59e0b; }
        .status-offline { background-color: #6b7280; }
        .task-backlog { border-left: 4px solid #6b7280; }
        .task-in_progress { border-left: 4px solid #3b82f6; }
        .task-review { border-left: 4px solid #8b5cf6; }
        .task-done { border-left: 4px solid #10b981; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen">
    <div class="container mx-auto px-4 py-8">
        <!-- Заголовок -->
        <div class="mb-8">
            <h1 class="text-3xl font-bold text-gray-800">
                <i class="fas fa-robot mr-3 text-blue-500"></i>
                Team Dashboard - Управление AI агентами
            </h1>
            <p class="text-gray-600 mt-2">Мониторинг и управление командой разработки</p>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <!-- Левая колонка: Агенты -->
            <div class="lg:col-span-1">
                <div class="bg-white rounded-lg shadow p-6">
                    <h2 class="text-xl font-bold text-gray-800 mb-4">
                        <i class="fas fa-users mr-2"></i> Команда агентов
                    </h2>
                    
                    <div id="agents-list" class="space-y-4">
                        <!-- Агенты загружаются через JS -->
                    </div>

                    <div class="mt-6 pt-6 border-t border-gray-200">
                        <h3 class="font-bold text-gray-700 mb-2">Статистика:</h3>
                        <div class="grid grid-cols-2 gap-2">
                            <div class="bg-gray-50 p-3 rounded">
                                <div class="text-2xl font-bold text-blue-600" id="available-count">0</div>
                                <div class="text-sm text-gray-600">Доступно</div>
                            </div>
                            <div class="bg-gray-50 p-3 rounded">
                                <div class="text-2xl font-bold text-orange-600" id="busy-count">0</div>
                                <div class="text-sm text-gray-600">Занято</div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Правая колонка: Задачи и управление -->
            <div class="lg:col-span-2">
                <!-- Форма создания задачи -->
                <div class="bg-white rounded-lg shadow p-6 mb-6">
                    <h2 class="text-xl font-bold text-gray-800 mb-4">
                        <i class="fas fa-plus-circle mr-2 text-green-500"></i> Новая задача
                    </h2>
                    
                    <form id="task-form" class="space-y-4">
                        <div>
                            <label class="block text-gray-700 mb-2">Название задачи</label>
                            <input type="text" id="task-title" 
                                   class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
                                   placeholder="Например: Создать лендинг для канала" required>
                        </div>
                        
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <div>
                                <label class="block text-gray-700 mb-2">Приоритет</label>
                                <select id="task-priority" class="w-full px-4 py-2 border border-gray-300 rounded-lg">
                                    <option value="low">Низкий</option>
                                    <option value="medium" selected>Средний</option>
                                    <option value="high">Высокий</option>
                                </select>
                            </div>
                            
                            <div>
                                <label class="block text-gray-700 mb-2">Дедлайн</label>
                                <input type="date" id="task-deadline" 
                                       class="w-full px-4 py-2 border border-gray-300 rounded-lg"
                                       value="2026-03-17">
                            </div>
                        </div>
                        
                        <div>
                            <label class="block text-gray-700 mb-2">Описание</label>
                            <textarea id="task-description" rows="3"
                                      class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
                                      placeholder="Детальное описание задачи..."></textarea>
                        </div>
                        
                        <button type="submit" 
                                class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded-lg transition duration-200">
                            <i class="fas fa-paper-plane mr-2"></i> Создать задачу
                        </button>
                    </form>
                </div>

                <!-- Список задач -->
                <div class="bg-white rounded-lg shadow p-6">
                    <div class="flex justify-between items-center mb-4">
                        <h2 class="text-xl font-bold text-gray-800">
                            <i class="fas fa-tasks mr-2"></i> Задачи
                        </h2>
                        <div class="flex space-x-2">
                            <button onclick="loadData()" class="px-4 py-2 bg-gray-100 hover:bg-gray-200 rounded-lg">
                                <i class="fas fa-sync-alt mr-2"></i>Обновить
                            </button>
                        </div>
                    </div>
                    
                    <div id="tasks-list" class="space-y-4">
                        <!-- Задачи загружаются через JS -->
                    </div>
                </div>
            </div>
        </div>

        <!-- Footer -->
        <div class="mt-8 text-center text-gray-500 text-sm">
            <p>🤖 Team Dashboard v1.0 | Управление AI агентами разработки</p>
            <p class="mt-1">Telegram бот: @opeclawka_bot (команда /help)</p>
        </div>
    </div>

    <script>
        // Загрузка данных
        async function loadData() {
            try {
                const [agentsRes, tasksRes] = await Promise.all([
                    fetch('/api/agents'),
                    fetch('/api/tasks')
                ]);
                
                const agents = await agentsRes.json();
                const tasks = await tasksRes.json();
                
                renderAgents(agents);
                renderTasks(tasks);
                updateStats(agents);
            } catch (error) {
                console.error('Ошибка загрузки:', error);
            }
        }

        // Рендер агентов
        function renderAgents(agents) {
            const container = document.getElementById('agents-list');
            container.innerHTML = agents.map(agent => `
                <div class="border border-gray-200 rounded-lg p-4 hover:bg-gray-50 transition">
                    <div class="flex justify-between items-start">
                        <div>
                            <h3 class="font-bold text-gray-800">${agent.name}</h3>
                            <div class="flex items-center mt-1">
                                <span class="inline-block w-3 h-3 rounded-full mr-2 ${agent.status === 'available' ? 'bg-green-500' : 'bg-orange-500'}"></span>
                                <span class="text-sm ${agent.status === 'available' ? 'text-green-600' : 'text-orange-600'}">
                                    ${agent.status === 'available' ? 'Доступен' : 'Занят'}
                                </span>
                            </div>
                            <div class="mt-2">
                                ${agent.skills.map(skill => `
                                    <span class="inline-block bg-blue-100 text-blue-800 text-xs px-2 py-1 rounded mr-1 mb-1">${skill}</span>
                                `).join('')}
                            </div>
                        </div>
                        <div class="text-right">
                            ${agent.currentTask ? 
                                `<span class="text-sm text-gray-500">Задача #${agent.currentTask}</span>` : 
                                `<span class="text-sm text-gray-400">Нет задачи</span>`
                            }
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // Рендер задач
        function renderTasks(tasks) {
            const container = document.getElementById('tasks-list');
            container.innerHTML = tasks.map(task => `
                <div class="border border-gray-200 rounded-lg p-4 task-${task.status} hover:shadow-md transition">
                    <div class="flex justify-between items-start">
                        <div class="flex-1">
                            <div class="flex items-center">
                                <span class="font-bold text-gray-800 mr-3">#${task.id} ${task.title}</span>
                                <span class="text-xs px-2 py-1 rounded ${task.priority === 'high' ? 'bg-red-100 text-red-800' : 
                                    task.priority === 'medium' ? 'bg-yellow-100 text-yellow-800' : 'bg-green-100 text-green-800'}">
                                    ${task.priority === 'high' ? 'Высокий' : task.priority === 'medium' ? 'Средний' : 'Низкий'} приоритет
                                </span>
                            </div>
                            <div class="mt-2 text-sm text-gray-600">
                                <div class="flex items-center">
                                    <i class="fas fa-calendar-alt mr-2"></i>
                                    <span>Дедлайн: ${task.deadline}</span>
                                </div>
                                <div class="flex items-center mt-1">
                                    <i class="fas fa-user mr-2"></i>
                                    <span>Агент: ${task.agent ? 'Назначен' : 'Не назначен'}</span>
                                </div>
                            </div>
                        </div>
                        <div class="text-right">
                            <span class="inline-block px-3 py-1 text-sm rounded-full 
                                ${task.status === 'backlog' ? 'bg-gray-100 text-gray-800' :
                                  task.status === 'in_progress' ? 'bg-blue-100 text-blue-800' :
                                  task.status === 'review' ? 'bg-purple-100 text-purple-800' :
                                  'bg-green-100 text-green-800'}">
                                ${task.status === 'backlog' ? 'В ожидании' :
                                  task.status === 'in_progress' ? 'В работе' :
                                  task.status === 'review' ? 'На проверке' : 'Завершено'}
                            </span>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // Обновление статистики
        function updateStats(agents) {
            const available = agents.filter(a => a.status === 'available').length;
            const busy = agents.filter(a => a.status === 'busy').length;
            
            document.getElementById('available-count').textContent = available;
            document.getElementById('busy-count').textContent = busy;
        }

        // Создание задачи
        document.getElementById('task-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const task = {
                title: document.getElementById('task-title').value,
                priority: document.getElementById('task-priority').value,
                deadline: document.getElementById('task-deadline').value,
                description: document.getElementById('task-description').value
            };
            
            try {
                const response = await fetch('/api/tasks', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(task)
                });
                
                if (response.ok) {
                    alert('✅ Задача создана!');
                    document.getElementById('task-form').reset();
                    loadData();
                }
            } catch (error) {
                console.error('Ошибка создания задачи:', error);
                alert('❌ Ошибка создания задачи');
            }
        });

        // Загрузка при старте
        document.addEventListener('DOMContentLoaded', loadData);
        
        // Автообновление каждые 30 секунд
        setInterval(loadData, 30000);
    </script>
</body>
</html>
